---
name: Lint

# yamllint disable-line rule:truthy
on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    branches: [main]
  workflow_run:
    workflows: [addon-metadata]
    types: [completed]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  find:
    runs-on: ubuntu-latest
    name: 📢 Find changed addons
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'ci')) ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    outputs:
      addons: ${{ steps.changed_addons.outputs.addons }}
    steps:
      - name: ⤵️ Check out the repository
        uses: actions/checkout@v6
      - name: 🗝️ Get changed files
        id: changed_files
        uses: jitterbit/get-changed-files@v1
        if: github.event_name != 'workflow_dispatch'
      - name: 🚀 Find add-on directories
        id: addons
        uses: home-assistant/actions/helpers/find-addons@master
      - name: 🦺 Get changed add-ons
        id: changed_addons
        run: |
          changed_addons=()
          for addon in ${{ steps.addons.outputs.addons }}; do
            if [[ "${{ steps.changed_files.outputs.all }}" =~ ${addon}/ ]]; then
              # Check if addon already in array
              already_added=0
              for existing in "${changed_addons[@]}"; do
                if [[ "$existing" == "\"${addon}\"," ]]; then
                  already_added=1
                  break
                fi
              done
              if [[ $already_added -eq 0 ]]; then
                changed_addons+=("\"${addon}\",");
              fi
            fi
          done

          changed=$(echo "${changed_addons[@]}" | rev | cut -c 2- | rev)
          echo "addons=[$changed]" >> "$GITHUB_OUTPUT";
          echo "Changed add-ons: [$changed]";

  lint-addon:
    name: 🔍 Lint add-on ${{ matrix.path }}
    runs-on: ubuntu-latest
    needs: find
    if: needs.find.outputs.addons != '[]'
    strategy:
      matrix:
        path: ${{ fromJson(needs.find.outputs.addons) }}
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v6
      - name: 📋 Verify build.yaml has project key
        run: |
          BUILD_FILE="${{ matrix.path }}/build.yaml"
          if [[ ! -f "$BUILD_FILE" ]]; then
            echo "❌ Error: build.yaml not found in ${{ matrix.path }}"
            exit 1
          fi

          # Install yq if not available
          if ! command -v yq &> /dev/null; then
            wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq
            chmod +x /usr/local/bin/yq
          fi

          # Check if project key exists and has a non-empty value
          PROJECT_VALUE=$(yq -r '.project // empty' "$BUILD_FILE")

          if [[ -z "$PROJECT_VALUE" || "$PROJECT_VALUE" == "null" ]]; then
            echo "❌ Error: build.yaml in ${{ matrix.path }} is missing 'project' key or has empty value"
            echo "Expected format:"
            echo "---"
            echo "project: https://github.com/upstream/project"
            exit 1
          fi

          echo "✅ build.yaml has project key with value: $PROJECT_VALUE"
      - name: 🚀 Run Home Assistant Add-on Lint
        uses: frenck/action-addon-linter@v2
        with:
          path: "./${{ matrix.path }}"

  lint-shellcheck:
    name: 🔍 Shellcheck
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v6
      - name: 🚀 Run Shellcheck
        uses: ludeeus/action-shellcheck@2.0.0
        env:
          SHELLCHECK_OPTS: -s bash
        with:
          ignore_paths: .claude docs scripts

  lint-markdown:
    name: 🔍 Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v6
      - name: 🚀 Run mdl
        uses: actionshub/markdownlint@v3.1.4
        with:
          filesToIgnoreRegex: "(.*(README|CHANGELOG|DOCS).md|^\\.claude/.*|^docs/.*|^scripts/.*)"

  lint-json:
    name: 🔍 JSON Lint
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v6
      - name: 🚀 Run JQ
        run: |
          find . -name "*.json" \
            -not -path "./.claude/*" \
            -not -path "./docs/*" \
            -not -path "./scripts/*" \
            -exec cat {} \; | jq '.'

  lint-yamllint:
    name: 🔍 YAML Lint
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v6
      - name: 🚀 Run YAMLLint
        uses: frenck/action-yamllint@v1
